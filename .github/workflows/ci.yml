name: Hotel Management CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERRHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker Images
        run: |
          docker build -t hotel-server-image ./server
          docker build -t hotel-client-image ./client

      - name: Tag Images
        run: |
          docker tag hotel-server-image ${{ secrets.DOCKERHUB_USERRNAME }}/hotel-server:latest
          docker tag hotel-client-image ${{ secrets.DOCKERHUB_USERNAME }}/hotel-client:latest

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERRNAME }}/hotel-server:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hotel-client:latest

      - name: Docker Logout
        if: always()
        run: docker logout
